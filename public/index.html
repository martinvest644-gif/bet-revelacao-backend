<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BET · Revelação — Baby Martins Sorato</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; background: #0a0a1a; }
    body { font-family: -apple-system, "SF Pro Display", system-ui, sans-serif; overscroll-behavior: none; }
    button { cursor: pointer; }
    input { -webkit-appearance: none; }
    @keyframes confetti-float {

<script type="text/babel">

// ─── UTILS ───────────────────────────────────────────────────────────────────
const fmt = (v) => `R$ ${Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 2 })}`;

function legacyCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

function copyText(text) {
  if (navigator.clipboard && window.isSecureContext) {
    return navigator.clipboard.writeText(text).catch(() => legacyCopy(text));
  }
  legacyCopy(text);
  return Promise.resolve();
}

function adminFetch(path, method = 'GET', body) {
  const pass = sessionStorage.getItem('adminPass') || '';
  return fetch(`${API}${path}`, {
    method,
    headers: { 'Content-Type': 'application/json', 'x-admin-pass': pass },
    body: body ? JSON.stringify(body) : undefined,
  }).then(r => r.json());
}

// ─── SHARE IMAGE ─────────────────────────────────────────────────────────────
function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

async function loadPhotos() {
  const candidates = [
    'family.jpeg',
    ...Array.from({length:12}, (_,i) => `photo${i+1}.jpg`),
    ...Array.from({length:12}, (_,i) => `photo${i+1}.jpeg`),
  ];
  const imgs = await Promise.all(candidates.map(src => new Promise(res => {
    const img = new Image();
    img.onload  = () => res(img);
    img.onerror = () => res(null);
    img.src = src;
  })));
  return imgs.filter(Boolean);
}

async function generateShareCard(name, team) {
  const W = 1080, H = 1920;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const c = cv.getContext('2d');

  const photos = await loadPhotos();

  // fundo gradiente
  const gBg = c.createLinearGradient(0, 0, W, H);
  if (team === 'boy') {
    gBg.addColorStop(0,'#0f172a'); gBg.addColorStop(0.5,'#1e3a8a'); gBg.addColorStop(1,'#2563EB');
  } else {
    gBg.addColorStop(0,'#1a0a1a'); gBg.addColorStop(0.5,'#831843'); gBg.addColorStop(1,'#EC4899');
  }
  c.fillStyle = gBg; c.fillRect(0,0,W,H);

  // fotos da família caindo em posições rotacionadas
  if (photos.length > 0) {
    const placements = [
      { x:860, y:200,  s:260, rot:18,  alpha:0.22 },
      { x:80,  y:520,  s:200, rot:-12, alpha:0.18 },
      { x:780, y:860,  s:230, rot:25,  alpha:0.20 },
      { x:60,  y:1200, s:180, rot:-8,  alpha:0.16 },
      { x:820, y:1400, s:210, rot:14,  alpha:0.19 },
      { x:180, y:1640, s:190, rot:-20, alpha:0.17 },
    ];
    placements.forEach(({ x, y, s, rot, alpha }, i) => {
      const img = photos[i % photos.length];
      c.save();
      c.globalAlpha = alpha;
      c.translate(x, y);
      c.rotate(rot * Math.PI / 180);
      rrect(c, -s/2, -s/2, s, s, 24);
      c.clip();
      c.drawImage(img, -s/2, -s/2, s, s);
      c.restore();
    });
  }

  // "?" marks flutuando
  const qPos = [
    { x:180, y:280,  size:110, alpha:0.25, rot:-15 },
    { x:920, y:530,  size:90,  alpha:0.20, rot:20  },
    { x:120, y:1000, size:130, alpha:0.22, rot:-8  },
    { x:900, y:1170, size:100, alpha:0.18, rot:12  },
    { x:500, y:1470, size:80,  alpha:0.20, rot:-5  },
  ];
  qPos.forEach(({ x, y, size, alpha, rot }) => {
    c.save();
    c.globalAlpha = alpha;
    c.translate(x, y);
    c.rotate(rot * Math.PI / 180);
    c.fillStyle = '#fff';
    c.font = `900 ${size}px -apple-system, Arial, sans-serif`;
    c.textAlign = 'center';
    c.fillText('?', 0, 0);
    c.restore();
  });
  c.textAlign = 'left';

  // overlay escuro para legibilidade
  const ov = c.createLinearGradient(0, 0, 0, H);
  ov.addColorStop(0,'rgba(0,0,0,0.55)');
  ov.addColorStop(0.45,'rgba(0,0,0,0.3)');
  ov.addColorStop(0.8,'rgba(0,0,0,0.5)');
  ov.addColorStop(1,'rgba(0,0,0,0.65)');
  c.fillStyle = ov; c.globalAlpha=1; c.fillRect(0,0,W,H);

  // tag topo
  c.fillStyle = 'rgba(255,255,255,0.18)';
  rrect(c,80,160,380,64,32); c.fill();
  c.fillStyle = '#fff';
  c.font = `bold 30px -apple-system, Arial, sans-serif`;
  c.fillText(`● BETBABY · ${PARTY.date}`, 118, 204);

  // texto principal
  c.fillStyle = '#fff';
  c.font = `900 italic 210px -apple-system, Arial, sans-serif`;
  c.fillText('EU', 80, 600);
  c.font = `900 italic 148px -apple-system, Arial, sans-serif`;
  c.fillText('APOSTEI', 80, 780);

  c.font = `900 italic 128px -apple-system, Arial, sans-serif`;
  c.fillStyle = team === 'boy' ? '#93C5FD' : '#F9A8D4';
  c.fillText(team === 'boy' ? 'MENINO!' : 'MENINA!', 80, 940);
  c.font = `110px sans-serif`;
  c.fillText(team === 'boy' ? '👦' : '👧', 80, 1070);

  c.font = `52px -apple-system, Arial, sans-serif`;
  c.fillStyle = 'rgba(255,255,255,0.82)';
  c.fillText(`do ${PARTY.babyName}`, 80, 1155);

  c.font = `bold 48px -apple-system, Arial, sans-serif`;
  c.fillStyle = 'rgba(255,255,255,0.55)';
  c.fillText(name, 80, 1220);

  // card inferior
  c.fillStyle = 'rgba(255,255,255,0.14)';
  rrect(c,80,H-330,W-160,210,36); c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.22)'; c.lineWidth = 2;
  rrect(c,80,H-330,W-160,210,36); c.stroke();
  c.fillStyle = 'rgba(255,255,255,0.7)';
  c.font = `42px -apple-system, Arial, sans-serif`;
  c.fillText('E você, chuta o quê?', 120, H-265);
  c.fillStyle = '#fff';
  c.font = `bold 54px -apple-system, Arial, sans-serif`;
  c.fillText('betbaby.app/sorato  \u2192', 120, H-195);

  return cv;
}

async function shareCard(name, team) {
  const cv = await generateShareCard(name, team);
  return new Promise(resolve => {
    cv.toBlob(async (blob) => {
      const file = new File([blob], 'bet-revelacao.jpg', { type: 'image/jpeg' });
      let shared = false;
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files:[file], title:'BET Revelação',
            text:`Apostei no chá revelação do ${PARTY.babyName}! E você?` });
          shared = true;
        } catch(e) { if (e.name === 'AbortError') { resolve(); return; } }
      }
      if (!shared) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'bet-revelacao.jpg'; a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1500);
      }
      resolve();
    }, 'image/jpeg', 0.92);
  });
}

// ─── SHARED COMPONENTS ───────────────────────────────────────────────────────
function Confetti({ count=36, colors=['#2563EB','#EC4899','#F97316','#FFFFFF','#FCD34D'] }) {
  const pieces = React.useMemo(() => Array.from({ length:count }, (_,i) => {
    const seed = i*9301+49297;
    const r = (n) => ((seed*(n+1))%233280)/233280;
    return { left:r(1)*100, top:r(2)*100, size:4+r(3)*8, rot:r(4)*360,
             color:colors[i%colors.length], shape:i%3, delay:r(5)*3 };
  }), []);
  return (
    <div style={{position:'absolute',inset:0,pointerEvents:'none',overflow:'hidden'}}>
      {pieces.map((p,i) => (
        <div key={i} style={{ position:'absolute', left:`${p.left}%`, top:`${p.top}%`,
          width:p.size, height:p.shape===1?p.size*1.6:p.size, background:p.color,
          borderRadius:p.shape===2?'50%':2, transform:`rotate(${p.rot}deg)`,
          animation:`confetti-float ${3+p.delay}s ease-in-out ${p.delay}s infinite alternate` }} />
      ))}
    </div>
  );
}

function SplashScreen({ bets, onStart, onRanking, onAdmin }) {
  const [tapCount, setTapCount] = React.useState(0);
  const tapTimer = React.useRef(null);

  const handleLogoTap = () => {
    const next = tapCount + 1;
    setTapCount(next);
    clearTimeout(tapTimer.current);
    if (next >= 5) { setTapCount(0); onAdmin(); return; }
    tapTimer.current = setTimeout(() => setTapCount(0), 2000);
  };

  return (
    <div className="screen" style={{ height:'100%',position:'relative',overflow:'hidden',
      background:'#0F0F23',fontFamily:'inherit' }}>
      <Blobs />
      <Confetti count={24} colors={['#FFFFFF','#FCD34D','#FB7185']} />
      <div style={{ position:'relative',height:'100%',padding:'72px 28px 40px',
        display:'flex',flexDirection:'column' }}>
        <div style={{ alignSelf:'flex-start',padding:'6px 14px',borderRadius:999,
          background:'rgba(255,255,255,0.12)',border:'1px solid rgba(255,255,255,0.2)',
          color:'#fff',fontSize:11,fontWeight:700,letterSpacing:1.5,marginBottom:20 }}>
          ● AO VIVO · {bets.length} {bets.length===1?'APOSTA':'APOSTAS'}
        </div>

        <div onClick={handleLogoTap} style={{ cursor:'default',userSelect:'none',width:'fit-content' }}>
          <BabyPhoto size={88} />
        </div>

        <div style={{ fontSize:56,fontWeight:900,color:'#fff',letterSpacing:-2.5,
          lineHeight:.95,marginTop:18,marginBottom:4,fontStyle:'italic' }}>CHUTA AÍ,</div>
        <div style={{ fontSize:30,fontWeight:900,letterSpacing:-1,lineHeight:1,
          marginBottom:16,fontStyle:'italic',
          background:'linear-gradient(90deg,#60A5FA,#F472B6,#FB923C)',
          WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent' }}>
          do {PARTY.babyName}</div>

        <div style={{ fontSize:15,color:'rgba(255,255,255,0.75)',lineHeight:1.45,
          marginBottom:'auto',maxWidth:300 }}>
          Aposta no Pix. Acertou o sexo? Concorre a{' '}

            Ver ranking ao vivo →

    </div>

function AmountScreen({ amount, setAmount, onNext, onBack }) {

      setAmount(prev => { const s=String(prev); return s.length>1?Number(s.slice(0,-1)):0; });

      setAmount(prev => { const n=Number(String(prev===0?'':prev)+k); return n>99999?prev:n; });
    }
  };
  return (
    <BoldFrame step={3} onBack={onBack}>
      <div className="screen" style={{display:'flex',flexDirection:'column',flex:1}}>
        <StepLabel n="03" label="A APOSTA" />

          <span style={{fontSize:80,fontWeight:900,letterSpacing:-3.5,lineHeight:.9,
            fontStyle:'italic',fontVariantNumeric:'tabular-nums',

            WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>{amount||0}</span>
        </div>
        <div style={{textAlign:'center',fontSize:11,color:'rgba(255,255,255,0.55)',
          marginBottom:12,lineHeight:1.4}}>
          🍷 Maior aposta <b style={{color:'#fff'}}>+</b> sorteio entre acertadores levam o vinho
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:10}}>

            <button key={v} onClick={()=>setAmount(v)} style={{

// ─── ADMIN: LOGIN ─────────────────────────────────────────────────────────────
function AdminLogin({ onClose, onSuccess }) {
  const [pass, setPass] = React.useState('');
  const [err, setErr]   = React.useState(false);
  const [loading, setLoading] = React.useState(false);

  const tryLogin = async () => {
    setLoading(true);
    sessionStorage.setItem('adminPass', pass);
    try {
      const d = await adminFetch('/api/state');
      if (d.error || d.message) { setErr(true); sessionStorage.removeItem('adminPass'); }
      else onSuccess();
    } catch(e) { setErr(true); }
    setLoading(false);
  };

  return (
    <div style={{position:'absolute',inset:0,zIndex:200,
      background:'rgba(0,0,0,0.88)',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',padding:28,animation:'fadeIn .2s ease'}}>
      <div style={{width:'100%',maxWidth:320,background:'#161628',borderRadius:24,
        padding:24,border:'1px solid rgba(255,255,255,0.12)'}}>
        <div style={{fontSize:22,fontWeight:900,fontStyle:'italic',color:'#fff',marginBottom:4}}>🔒 Admin</div>
        <div style={{fontSize:13,color:'rgba(255,255,255,0.55)',marginBottom:20}}>
          Senha de acesso ao painel
        </div>
        <input type="password" value={pass} onChange={e=>{setPass(e.target.value);setErr(false);}}
          onKeyDown={e=>e.key==='Enter'&&!loading&&tryLogin()}
          placeholder="Senha..."
          style={{width:'100%',background:'rgba(255,255,255,0.06)',
            border:'1px solid '+(err?'#F87171':'rgba(255,255,255,0.15)'),
            borderRadius:14,padding:'14px 16px',color:'#fff',fontSize:16,fontFamily:'inherit',
            outline:'none',marginBottom:err?6:16}} />
        {err&&<div style={{fontSize:12,color:'#F87171',marginBottom:12}}>Senha incorreta.</div>}
        <div style={{display:'flex',gap:8}}>
          <button onClick={tryLogin} disabled={loading} style={{flex:2,height:46,borderRadius:14,border:'none',
            background:'linear-gradient(90deg,#2563EB,#EC4899)',color:'#fff',
            fontSize:14,fontWeight:800,fontFamily:'inherit',cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            {loading?<><Spinner/> Entrando...</>:'Entrar'}
          </button>
          <button onClick={onClose} style={{flex:1,height:46,borderRadius:14,
            background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.12)',
            color:'rgba(255,255,255,0.6)',fontSize:13,fontWeight:700,fontFamily:'inherit',cursor:'pointer'}}>
            Fechar
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── ADMIN: PAINEL ────────────────────────────────────────────────────────────
function AdminPanel({ bets, appState, onClose, onUpdate }) {
  const [loading, setLoading] = React.useState('');
  const [confirm, setConfirm] = React.useState('');
  const [errMsg,  setErrMsg]  = React.useState('');
  const { revealed, winners } = appState||{};
  const sorted = [...bets].sort((a,b)=>b.amount-a.amount);
  const total = bets.reduce((s,b)=>s+b.amount, 0);

  const act = async (key, fn) => {
    setLoading(key); setErrMsg('');
    try {
      const res = await fn();
      if (res && res.error) { setErrMsg(res.error); }
      else { await onUpdate(); }
    } catch(e) { setErrMsg('Erro de conexão. Tente novamente.'); }
    setLoading('');
  };

  const doReveal = (team) => act('reveal', () => adminFetch('/api/admin/reveal','POST',{team}));
  const doDraw   = ()     => act('draw',   () => adminFetch('/api/admin/draw','POST'));
  const doDelete = (id)   => act(`del${id}`,()=> adminFetch(`/api/admin/bets/${id}`,'DELETE'));
  const doReset  = () => {
    if (confirm!=='reset') { setConfirm('reset'); return; }
    setConfirm('');
    act('reset', () => adminFetch('/api/admin/reset','DELETE'));
  };

  return (
    <div style={{position:'absolute',inset:0,zIndex:150,background:'#0a0a1a',
      display:'flex',flexDirection:'column',animation:'fadeIn .2s ease',color:'#fff'}}>
      {/* header */}
      <div style={{padding:'54px 22px 14px',background:'#0F0F23',
        borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:11,fontWeight:800,letterSpacing:2,
              background:'linear-gradient(90deg,#60A5FA,#F472B6)',
              WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>PAINEL ADMIN</div>
            <div style={{fontSize:20,fontWeight:900,fontStyle:'italic'}}>
              {bets.length} apostas · {fmt(total)}
            </div>
          </div>
          <div onClick={onClose} style={{width:36,height:36,borderRadius:18,
            background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.15)',
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,cursor:'pointer'}}>✕</div>
        </div>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'14px 22px 28px',
        display:'flex',flexDirection:'column',gap:12}}>

        {errMsg && (
          <div style={{padding:'10px 14px',borderRadius:12,
            background:'rgba(239,68,68,0.15)',border:'1px solid rgba(239,68,68,0.35)',
            color:'#F87171',fontSize:13,fontWeight:600}}>
            ⚠️ {errMsg}
          </div>
        )}

        {/* Revelação */}
        <div style={{background:'#161628',borderRadius:18,padding:16,
          border:'1px solid rgba(255,255,255,0.08)'}}>
          <div style={{fontSize:11,fontWeight:800,letterSpacing:1.5,
            color:'rgba(255,255,255,0.45)',marginBottom:10}}>REVELAÇÃO</div>
          {revealed ? (
            <div style={{padding:'10px 14px',borderRadius:12,
              background:revealed==='boy'?'rgba(37,99,235,0.25)':'rgba(236,72,153,0.25)',
              border:`1px solid ${revealed==='boy'?'rgba(96,165,250,0.4)':'rgba(244,114,182,0.4)'}`}}>
              <div style={{fontSize:15,fontWeight:800,fontStyle:'italic'}}>
                Revelado: {revealed==='boy'?'MENINO 👦':'MENINA 👧'}
              </div>
            </div>
          ) : (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {['boy','girl'].map(t => (
                <button key={t} onClick={()=>doReveal(t)} disabled={!!loading}
                  style={{ height:56,borderRadius:14,border:'none',cursor:loading?'default':'pointer',
                    background:t==='boy'?'linear-gradient(90deg,#60A5FA,#2563EB)':'linear-gradient(90deg,#F472B6,#EC4899)',
                    color:'#fff',fontSize:15,fontWeight:800,fontFamily:'inherit',fontStyle:'italic',
                    display:'flex',alignItems:'center',justifyContent:'center',gap:8,
                    opacity:loading?0.6:1 }}>
                  {loading==='reveal'?<Spinner/>:(t==='boy'?'👦 MENINO':'👧 MENINA')}
                </button>
              ))}
            </div>
          )}
        </div>

        {/* Sorteio */}
        <div style={{background:'#161628',borderRadius:18,padding:16,
          border:'1px solid rgba(255,255,255,0.08)'}}>
          <div style={{fontSize:11,fontWeight:800,letterSpacing:1.5,
            color:'rgba(255,255,255,0.45)',marginBottom:10}}>SORTEIO</div>
          {winners ? (
            <div style={{padding:'12px 14px',borderRadius:12,
              background:'rgba(252,211,77,0.12)',border:'1px solid rgba(252,211,77,0.3)'}}>
              <div style={{fontSize:12,fontWeight:800,color:'#FCD34D',marginBottom:6}}>🍷 RESULTADO</div>
              {winners.highestBet&&<div style={{fontSize:13,marginBottom:4}}>
                💰 Maior aposta: <b>{winners.highestBet.name}</b>{' '}
                <span style={{color:'rgba(255,255,255,0.5)',fontSize:11}}>({fmt(winners.highestBet.amount)})</span>
              </div>}
              {winners.raffle&&<div style={{fontSize:13}}>
                🎲 Sorteio: <b>{winners.raffle.name}</b>{' '}
                <span style={{color:'rgba(255,255,255,0.5)',fontSize:11}}>({fmt(winners.raffle.amount)})</span>
              </div>}
              {!winners.raffle&&<div style={{fontSize:12,color:'rgba(255,255,255,0.5)',marginTop:4}}>
                Ninguém acertou o time — sem ganhador no sorteio.
              </div>}
            </div>
          ) : (
            <>
              <button onClick={doDraw} disabled={!revealed||!!loading}
                style={{ width:'100%',height:52,borderRadius:14,border:'none',
                  cursor:revealed&&!loading?'pointer':'default',
                  background:revealed?'linear-gradient(90deg,#F97316,#FCD34D)':'rgba(255,255,255,0.06)',
                  color:revealed?'#0a0a1a':'rgba(255,255,255,0.3)',
                  fontSize:15,fontWeight:800,fontFamily:'inherit',fontStyle:'italic',
                  display:'flex',alignItems:'center',justifyContent:'center',gap:8,
                  opacity:loading?0.6:1 }}>
                {loading==='draw'?<Spinner/>:'🎲 Realizar Sorteio'}
              </button>
              {!revealed&&<div style={{fontSize:11,color:'rgba(255,255,255,0.4)',marginTop:8,textAlign:'center'}}>
                Faça a revelação primeiro.
              </div>}
            </>
          )}
        </div>

        {/* Lista */}
        <div style={{background:'#161628',borderRadius:18,padding:16,
          border:'1px solid rgba(255,255,255,0.08)'}}>
          <div style={{fontSize:11,fontWeight:800,letterSpacing:1.5,
            color:'rgba(255,255,255,0.45)',marginBottom:10}}>
            APOSTAS ({bets.length})
          </div>
          {sorted.length===0&&<div style={{textAlign:'center',color:'rgba(255,255,255,0.4)',
            fontSize:13,padding:'20px 0',fontStyle:'italic'}}>Nenhuma aposta ainda.</div>}
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {sorted.map((b,i) => {
              const tg = b.team==='boy'?'linear-gradient(135deg,#60A5FA,#2563EB)':'linear-gradient(135deg,#F472B6,#EC4899)';
              const isDel = loading===`del${b.id}`;
              return (
                <div key={b.id} style={{display:'flex',alignItems:'center',gap:10,
                  padding:'8px 10px',borderRadius:10,background:'rgba(255,255,255,0.04)',
                  border:'1px solid rgba(255,255,255,0.06)'}}>
                  <div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,0.4)',width:18}}>{i+1}</div>
                  <div style={{width:24,height:24,borderRadius:12,background:tg,flexShrink:0,
                    display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800}}>
                    {b.name.charAt(0).toUpperCase()}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:600,whiteSpace:'nowrap',
                      overflow:'hidden',textOverflow:'ellipsis'}}>{b.name}</div>
                    <div style={{fontSize:10,color:'rgba(255,255,255,0.45)'}}>
                      {b.team==='boy'?'👦 Boy':'👧 Girl'}
                    </div>
                  </div>
                  <div style={{fontSize:13,fontWeight:800}}>{fmt(b.amount)}</div>
                  <button onClick={()=>doDelete(b.id)} disabled={!!loading}
                    style={{width:28,height:28,borderRadius:8,border:'none',
                      background:'rgba(239,68,68,0.15)',color:'#F87171',fontSize:16,
                      cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',
                      justifyContent:'center',opacity:isDel?0.5:1}}>
                    {isDel?<Spinner/>:'×'}
                  </button>
                </div>
              );
            })}
          </div>
        </div>

        {/* Reset */}
        <button onClick={doReset} disabled={!!loading}
          style={{ width:'100%',height:46,borderRadius:14,
            border:'1px solid rgba(239,68,68,0.35)',
            background:confirm==='reset'?'rgba(239,68,68,0.25)':'rgba(239,68,68,0.08)',
            color:'#F87171',fontSize:13,fontWeight:700,fontFamily:'inherit',cursor:'pointer' }}>
          {confirm==='reset'?'⚠️ Clique de novo para confirmar':'🗑️ Resetar tudo (apostas + revelação)'}
        </button>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [screen,   setScreen]   = React.useState('splash');
  const [name,     setName]     = React.useState('');
  const [team,     setTeam]     = React.useState('girl');
  const [amount,   setAmount]   = React.useState(50);
  const [betId,    setBetId]    = React.useState(null);
  const [bets,     setBets]     = React.useState([]);
  const [appState, setAppState] = React.useState({ revealed:null, winners:null });
  const [loading,  setLoading]  = React.useState(false);
  const [showAdminLogin, setShowAdminLogin] = React.useState(false);
  const [showAdmin,      setShowAdmin]      = React.useState(false);

  const loadData = React.useCallback(async () => {
    const [betsData, stateData] = await Promise.all([
      fetch(`${API}/api/bets`).then(r=>r.json()).catch(()=>null),
      fetch(`${API}/api/state`).then(r=>r.json()).catch(()=>null),
    ]);
    if (betsData) setBets(betsData.bets || []);
    if (stateData) setAppState(stateData);
  }, []);

  React.useEffect(() => {
    loadData();
    const socket = io(window.location.origin, { transports:['websocket','polling'] });
    socket.on('bet:new',      ({bet}) => setBets(p=>p.find(b=>b.id===bet.id)?p:[...p,bet]));
    socket.on('bet:removed',  ({id})  => setBets(p=>p.filter(b=>b.id!==id)));
    socket.on('state:update', s       => setAppState(s));
    return () => socket.disconnect();
  }, []);

  const goToPixScreen = () => {
    if (!betId) {
      setLoading(true);
      fetch(`${API}/api/bets`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name:name.trim(), team, amount }),
      }).then(r=>r.json()).then(d=>{ if(d.bet) setBetId(d.bet.id); })
        .catch(()=>{}).finally(()=>setLoading(false));
    }
    setScreen('pix');
  };

  const screens = {
    splash:  <SplashScreen bets={bets} onStart={()=>setScreen('name')}
               onRanking={()=>setScreen('ranking')} onAdmin={()=>setShowAdminLogin(true)} />,
    name:    <NameScreen name={name} setName={setName}
               onNext={()=>setScreen('gender')} onBack={()=>setScreen('splash')} />,
    gender:  <GenderScreen team={team} setTeam={setTeam}
               onNext={()=>setScreen('amount')} onBack={()=>setScreen('name')} />,
    amount:  <AmountScreen amount={amount} setAmount={setAmount}
               onNext={goToPixScreen} onBack={()=>setScreen('gender')} />,
    pix:     <PixScreen name={name} team={team} amount={amount}
               loading={loading} onConfirm={()=>setScreen('success')}
               onBack={()=>setScreen('amount')} />,
    success: <SuccessScreen name={name} team={team} amount={amount}
               onRanking={()=>setScreen('ranking')} />,
    ranking: <RankingScreen bets={bets} myBetId={betId} appState={appState}
               name={name} team={team} onShare={()=>shareCard(name,team)}
               onBack={()=>setScreen(betId?'success':'splash')} />,
  };

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',background:'#0a0a1a'}}>
      <div style={{width:'100%',maxWidth:430,height:'100%',maxHeight:920,
        position:'relative',overflow:'hidden',background:'#0F0F23',color:'#fff'}}>
        {screens[screen]}
        {showAdminLogin && !showAdmin && (
          <AdminLogin onClose={()=>setShowAdminLogin(false)}
            onSuccess={()=>{ setShowAdminLogin(false); setShowAdmin(true); loadData(); }} />
        )}
        {showAdmin && (
          <AdminPanel bets={bets} appState={appState}
            onClose={()=>setShowAdmin(false)} onUpdate={loadData} />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
