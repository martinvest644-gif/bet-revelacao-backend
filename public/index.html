<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BET · Revelação — Baby Martins Sorato</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; background: #0a0a1a; }
    body { font-family: -apple-system, "SF Pro Display", system-ui, sans-serif; overscroll-behavior: none; }
    button { cursor: pointer; }
    @keyframes confetti-float {
      0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.9; }
      100% { transform: translateY(-40px) rotate(200deg) scale(0.8); opacity: 0.5; }
    }
    @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes slideUp {
      from { transform: translateY(14px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .screen { animation: fadeIn .25s ease; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin></script>

<script type="text/babel">
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const API = 'https://web-production-762ee0.up.railway.app';

const PARTY = {
  parents:   'Família Martins Sorato',
  date:      '14 JUN',
  babyName:  'Baby Martins Sorato',
  eventDate: '16 de Maio às 17:00',
  prize:     'Vinho 90+ pts · R$ 1.000',
  pixCode:   '00020126420014BR.GOV.BCB.PIX0111057480081650205BBaby5204000053039865802BR5924Nicholas Eduardo Pereira6009SAO PAULO62140510NO6RiPLeRv630452AF',
};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const fmt = (v) => `R$ ${Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 2 })}`;

function Confetti({ count = 36, colors = ['#2563EB','#EC4899','#F97316','#FFFFFF','#FCD34D'] }) {
  const pieces = React.useMemo(() => Array.from({ length: count }, (_, i) => {
    const seed = i * 9301 + 49297;
    const r = (n) => ((seed * (n + 1)) % 233280) / 233280;
    return { left: r(1)*100, top: r(2)*100, size: 4+r(3)*8, rot: r(4)*360,
             color: colors[i % colors.length], shape: i % 3, delay: r(5)*3 };
  }), []);
  return (
    <div style={{ position:'absolute', inset:0, pointerEvents:'none', overflow:'hidden' }}>
      {pieces.map((p,i) => (
        <div key={i} style={{
          position:'absolute', left:`${p.left}%`, top:`${p.top}%`,
          width: p.size, height: p.shape===1 ? p.size*1.6 : p.size,
          background: p.color, borderRadius: p.shape===2 ? '50%' : 2,
          transform: `rotate(${p.rot}deg)`,
          animation: `confetti-float ${3+p.delay}s ease-in-out ${p.delay}s infinite alternate`,
        }} />
      ))}
    </div>
  );
}

function BabyPhoto({ size=88, ring=true }) {
  return (
    <div style={{
      width:size, height:size, borderRadius:size/2, flexShrink:0,
      padding: ring ? 2 : 0,
      background: ring ? 'linear-gradient(135deg,#60A5FA,#F472B6,#FB923C)' : 'transparent',
      boxShadow: ring ? '0 8px 24px rgba(236,72,153,.35)' : 'none',
    }}>
      <img src="family.jpeg" alt="Família"
        style={{ width:'100%', height:'100%', borderRadius:(size/2)-(ring?2:0),
                 objectFit:'cover', objectPosition:'50% 35%', display:'block' }} />
    </div>
  );
}

// Gradiente bg blobs reutilizável
function Blobs() {
  return <>
    <div style={{ position:'absolute', top:-100, left:-100, width:400, height:400, borderRadius:'50%',
      background:'radial-gradient(circle,#2563EB 0%,transparent 70%)', filter:'blur(40px)' }} />
    <div style={{ position:'absolute', top:200, right:-120, width:380, height:380, borderRadius:'50%',
      background:'radial-gradient(circle,#EC4899 0%,transparent 70%)', filter:'blur(40px)' }} />
    <div style={{ position:'absolute', bottom:-80, left:40, width:320, height:320, borderRadius:'50%',
      background:'radial-gradient(circle,#F97316 0%,transparent 70%)', filter:'blur(40px)' }} />
  </>;
}

function GradBtn({ children, onClick, disabled, color }) {
  const bg = color === 'green'
    ? 'linear-gradient(90deg,#22C55E,#16A34A)'
    : 'linear-gradient(90deg,#2563EB,#EC4899,#F97316)';
  return (
    <button onClick={onClick} disabled={disabled} style={{
      width:'100%', height:58, borderRadius:20, border:'none',
      background: disabled ? 'rgba(255,255,255,0.1)' : bg,
      color: disabled ? 'rgba(255,255,255,0.4)' : '#fff',
      fontSize:18, fontWeight:800, letterSpacing:-0.3,
      fontFamily:'inherit', fontStyle:'italic',
      boxShadow: disabled ? 'none' : '0 12px 32px rgba(236,72,153,.4)',
      transition:'all .2s',
    }}>{children}</button>
  );
}

// Barra de progresso com steps
function StepBar({ step, total=4, onBack }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:16, marginBottom:24 }}>
      <div onClick={onBack} style={{
        width:40, height:40, borderRadius:20,
        background:'rgba(255,255,255,0.1)', border:'1px solid rgba(255,255,255,0.15)',
        display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0,
      }}>
        <svg width="10" height="16" viewBox="0 0 10 16" fill="none">
          <path d="M8 2L2 8l6 6" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
      <div style={{ display:'flex', gap:6, flex:1 }}>
        {Array.from({ length:total }, (_,i) => (
          <div key={i} style={{
            flex:1, height:4, borderRadius:2,
            background: i < step
              ? 'linear-gradient(90deg,#2563EB,#EC4899,#F97316)'
              : 'rgba(255,255,255,0.15)',
          }} />
        ))}
      </div>
    </div>
  );
}

function BoldFrame({ children, step, total=4, onBack }) {
  return (
    <div style={{ height:'100%', position:'relative', overflow:'hidden',
      background:'#0F0F23', fontFamily:'inherit', color:'#fff' }}>
      <div style={{ position:'absolute', top:-120, right:-100, width:320, height:320,
        borderRadius:'50%', opacity:.5,
        background:'radial-gradient(circle,#EC4899 0%,transparent 70%)', filter:'blur(50px)' }} />
      <div style={{ position:'absolute', bottom:-100, left:-60, width:260, height:260,
        borderRadius:'50%', opacity:.4,
        background:'radial-gradient(circle,#2563EB 0%,transparent 70%)', filter:'blur(50px)' }} />
      <div style={{ position:'relative', height:'100%', padding:'60px 24px 0',
        display:'flex', flexDirection:'column' }}>
        <StepBar step={step} total={total} onBack={onBack} />
        {children}
      </div>
    </div>
  );
}

function StepLabel({ n, label }) {
  return (
    <div style={{ fontSize:13, fontWeight:800, letterSpacing:2,
      background:'linear-gradient(90deg,#60A5FA,#F472B6)',
      WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
      marginBottom:10 }}>{n} / {label}</div>
  );
}

// ─── TELA 1: SPLASH ──────────────────────────────────────────────────────────
function SplashScreen({ bets, onStart }) {
  return (
    <div className="screen" style={{ height:'100%', position:'relative', overflow:'hidden',
      background:'#0F0F23', fontFamily:'inherit' }}>
      <Blobs />
      <Confetti count={24} colors={['#FFFFFF','#FCD34D','#FB7185']} />
      <div style={{ position:'relative', height:'100%', padding:'72px 28px 40px',
        display:'flex', flexDirection:'column' }}>
        <div style={{
          alignSelf:'flex-start', padding:'6px 14px', borderRadius:999,
          background:'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.2)',
          color:'#fff', fontSize:11, fontWeight:700, letterSpacing:1.5, marginBottom:20,
        }}>● AO VIVO · {bets.length} {bets.length === 1 ? 'APOSTA' : 'APOSTAS'}</div>

        <BabyPhoto size={88} />

        <div style={{ fontSize:56, fontWeight:900, color:'#fff', letterSpacing:-2.5,
          lineHeight:.95, marginTop:18, marginBottom:4, fontStyle:'italic' }}>CHUTA AÍ,</div>
        <div style={{ fontSize:30, fontWeight:900, letterSpacing:-1, lineHeight:1,
          marginBottom:16, fontStyle:'italic',
          background:'linear-gradient(90deg,#60A5FA,#F472B6,#FB923C)',
          WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' }}>
          do {PARTY.babyName}</div>

        <div style={{ fontSize:15, color:'rgba(255,255,255,0.75)', lineHeight:1.45,
          marginBottom:'auto', maxWidth:300 }}>
          Aposta no Pix. Acertou o sexo? Concorre a{' '}
          <b style={{ color:'#FCD34D' }}>{PARTY.prize}</b>.
        </div>

        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          <GradBtn onClick={onStart}>Fazer meu palpite →</GradBtn>
          <button onClick={() => window._goRanking && window._goRanking()} style={{
            width:'100%', height:44, borderRadius:14,
            background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.15)',
            color:'rgba(255,255,255,0.7)', fontSize:13, fontWeight:700, fontFamily:'inherit',
          }}>Ver ranking ao vivo →</button>
        </div>
      </div>
    </div>
  );
}

// ─── TELA 2: NOME ────────────────────────────────────────────────────────────
function NameScreen({ name, setName, onNext, onBack }) {
  return (
    <BoldFrame step={1} onBack={onBack}>
      <div className="screen" style={{ display:'flex', flexDirection:'column', flex:1 }}>
        <StepLabel n="01" label="QUEM CHUTA" />
        <div style={{ fontSize:40, fontWeight:900, letterSpacing:-1.6, lineHeight:1,
          marginBottom:10, fontStyle:'italic' }}>Seu nome</div>
        <div style={{ fontSize:14, color:'rgba(255,255,255,0.65)', marginBottom:28, lineHeight:1.4 }}>
          No ranking da <b style={{ color:'#fff' }}>BET Revelação</b> vai aparecer exatamente assim.
        </div>

        <div style={{ background:'rgba(255,255,255,0.06)', borderRadius:20,
          padding:'18px 20px', border:'1px solid rgba(255,255,255,0.12)', marginBottom:14 }}>
          <div style={{ fontSize:11, color:'rgba(255,255,255,0.5)', fontWeight:700,
            letterSpacing:1.2, marginBottom:6 }}>PALPITEIRO(A)</div>
          <div style={{ display:'flex', alignItems:'center' }}>
            <input
              value={name}
              onChange={e => setName(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && name.trim() && onNext()}
              placeholder="Seu nome..."
              autoFocus
              style={{
                background:'transparent', border:'none', outline:'none',
                fontSize:24, fontWeight:700, color:'#fff', fontFamily:'inherit',
                width:'100%',
              }}
            />
            {name && <span style={{
              display:'inline-block', width:3, height:26, marginLeft:3,
              background:'linear-gradient(180deg,#EC4899,#F97316)',
              animation:'blink 1s infinite',
            }} />}
          </div>
        </div>

        {name.trim() && (
          <div style={{ padding:14, borderRadius:16,
            background:'rgba(255,255,255,0.03)', border:'1px dashed rgba(255,255,255,0.1)',
            marginBottom:16, animation:'slideUp .3s ease' }}>
            <div style={{ fontSize:10, color:'rgba(255,255,255,0.4)', fontWeight:700,
              letterSpacing:1.2, marginBottom:8 }}>PRÉVIA NO RANKING</div>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <div style={{ width:28, height:28, borderRadius:14,
                background:'linear-gradient(135deg,#F472B6,#EC4899)',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:11, fontWeight:800 }}>{name.trim().charAt(0).toUpperCase()}</div>
              <div style={{ fontSize:13, flex:1 }}>{name.trim()}</div>
            </div>
          </div>
        )}

        <div style={{ marginTop:'auto', paddingBottom:28 }}>
          <GradBtn onClick={onNext} disabled={!name.trim()}>Próximo →</GradBtn>
        </div>
      </div>
    </BoldFrame>
  );
}

// ─── TELA 3: PALPITE ─────────────────────────────────────────────────────────
function GenderScreen({ team, setTeam, onNext, onBack }) {
  return (
    <BoldFrame step={2} onBack={onBack}>
      <div className="screen" style={{ display:'flex', flexDirection:'column', flex:1 }}>
        <StepLabel n="02" label="SEU PALPITE" />
        <div style={{ fontSize:36, fontWeight:900, letterSpacing:-1.4, lineHeight:1,
          marginBottom:4, fontStyle:'italic' }}>Team</div>
        <div style={{ fontSize:56, fontWeight:900, letterSpacing:-2.2, lineHeight:.9,
          marginBottom:10, fontStyle:'italic', transition:'all .3s',
          background: team==='boy'
            ? 'linear-gradient(90deg,#60A5FA,#2563EB)'
            : 'linear-gradient(90deg,#F472B6,#EC4899)',
          WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' }}>
          {team==='boy' ? 'BOY?' : 'GIRL?'}
        </div>

        <div style={{ display:'inline-flex', alignSelf:'flex-start', alignItems:'center', gap:6,
          padding:'5px 11px', borderRadius:999,
          background:'rgba(252,211,77,0.12)', border:'1px solid rgba(252,211,77,0.3)',
          color:'#FCD34D', fontSize:11, fontWeight:700, marginBottom:20 }}>
          🍷 {PARTY.prize}
        </div>

        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {['boy','girl'].map((g) => {
            const active = team === g;
            const grad = g==='boy'
              ? 'linear-gradient(90deg,#60A5FA,#2563EB)'
              : 'linear-gradient(90deg,#F472B6,#EC4899)';
            return (
              <div key={g} onClick={() => setTeam(g)} style={{
                height:78, borderRadius:20, padding:'0 18px',
                display:'flex', alignItems:'center', gap:12,
                background: active ? grad : 'rgba(255,255,255,0.06)',
                border:'1px solid '+(active ? 'transparent' : 'rgba(255,255,255,0.12)'),
                transition:'all .2s', color:'#fff', cursor:'pointer',
              }}>
                <div style={{ fontSize:32 }}>{g==='boy' ? '👦' : '👧'}</div>
                <div style={{ fontSize:19, fontWeight:800, flex:1, letterSpacing:-0.3, fontStyle:'italic' }}>
                  TEAM {g==='boy' ? 'BOY' : 'GIRL'}
                </div>
                <div style={{
                  width:24, height:24, borderRadius:12,
                  border:'2px solid '+(active ? '#fff' : 'rgba(255,255,255,0.3)'),
                  background: active ? '#fff' : 'transparent',
                  display:'flex', alignItems:'center', justifyContent:'center',
                }}>
                  {active && <div style={{ width:10, height:10, borderRadius:5,
                    background: g==='boy' ? '#2563EB' : '#EC4899' }} />}
                </div>
              </div>
            );
          })}
        </div>

        <div style={{ marginTop:'auto', paddingBottom:28 }}>
          <GradBtn onClick={onNext}>Travar palpite →</GradBtn>
        </div>
      </div>
    </BoldFrame>
  );
}

// ─── TELA 4: VALOR ───────────────────────────────────────────────────────────
function AmountScreen({ amount, setAmount, onNext, onBack }) {
  const presets = [50, 100, 200, 500];

  const handleKey = (k) => {
    if (k === '⌫') {
      setAmount(prev => {
        const s = String(prev);
        const next = s.length > 1 ? Number(s.slice(0, -1)) : 0;
        return next;
      });
    } else if (k === '.') {
      // ignore decimals for simplicity
    } else {
      setAmount(prev => {
        const next = Number(String(prev === 0 ? '' : prev) + k);
        return next > 99999 ? prev : next;
      });
    }
  };

  return (
    <BoldFrame step={3} onBack={onBack}>
      <div className="screen" style={{ display:'flex', flexDirection:'column', flex:1 }}>
        <StepLabel n="03" label="A APOSTA" />
        <div style={{ fontSize:36, fontWeight:900, letterSpacing:-1.4, lineHeight:1,
          marginBottom:4, fontStyle:'italic' }}>Quanto vai<br/>apostar?</div>

        <div style={{ padding:'12px 0 4px', display:'flex', alignItems:'baseline',
          justifyContent:'center', gap:6 }}>
          <span style={{ fontSize:22, fontWeight:800, color:'rgba(255,255,255,0.6)', fontStyle:'italic' }}>R$</span>
          <span style={{ fontSize:80, fontWeight:900, letterSpacing:-3.5, lineHeight:.9,
            fontStyle:'italic', fontVariantNumeric:'tabular-nums',
            background:'linear-gradient(135deg,#60A5FA 0%,#F472B6 50%,#FB923C 100%)',
            WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' }}>{amount || 0}</span>
        </div>
        <div style={{ textAlign:'center', fontSize:11, color:'rgba(255,255,255,0.55)',
          marginBottom:12, lineHeight:1.4 }}>
          🍷 Maior aposta <b style={{ color:'#fff' }}>+</b> sorteio entre acertadores levam o vinho
        </div>

        <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:8, marginBottom:10 }}>
          {presets.map((v) => {
            const active = amount === v;
            return (
              <button key={v} onClick={() => setAmount(v)} style={{
                height:42, borderRadius:14,
                background: active ? 'linear-gradient(90deg,#EC4899,#F97316)' : 'rgba(255,255,255,0.06)',
                color:'#fff', border: active ? 'none' : '1px solid rgba(255,255,255,0.12)',
                fontSize:14, fontWeight:800, fontFamily:'inherit', fontStyle:'italic',
              }}>R${v}</button>
            );
          })}
        </div>

        <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:2, marginBottom:8 }}>
          {[1,2,3,4,5,6,7,8,9,'.',0,'⌫'].map((k, i) => (
            <div key={i} onClick={() => handleKey(k)} style={{
              height:44, display:'flex', alignItems:'center', justifyContent:'center',
              fontSize: k === '⌫' ? 18 : 20, fontWeight:600,
              color: k === '⌫' ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.85)',
              cursor:'pointer', userSelect:'none',
            }}>{k}</div>
          ))}
        </div>

        <div style={{ paddingBottom:22, marginTop:'auto' }}>
          <GradBtn onClick={onNext} disabled={!amount || amount <= 0}>Gerar Pix ⚡</GradBtn>
        </div>
      </div>
    </BoldFrame>
  );
}

// ─── TELA 5: PIX ─────────────────────────────────────────────────────────────
function PixScreen({ name, team, amount, betId, onConfirm, onBack, loading }) {
  const [copied, setCopied] = React.useState(false);
  const [readyTick, setReadyTick] = React.useState(false);

  React.useEffect(() => {
    if (!copied) return;
    const t = setTimeout(() => setReadyTick(true), 10000);
    return () => clearTimeout(t);
  }, [copied]);

  const onCopy = () => {
    const text = PARTY.pixCode;
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(() => setCopied(true)).catch(() => legacyCopy(text));
    } else {
      legacyCopy(text);
    }
  };

  const legacyCopy = (text) => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    setCopied(true);
  };

  return (
    <BoldFrame step={4} onBack={onBack}>
      <div className="screen" style={{ display:'flex', flexDirection:'column', flex:1 }}>
        <StepLabel n="04" label="PIX COPIA E COLA" />
        <div style={{ fontSize:32, fontWeight:900, letterSpacing:-1.2, lineHeight:1,
          marginBottom:6, fontStyle:'italic' }}>Copia, cola,<br/>apostou.</div>
        <div style={{ fontSize:12, color:'rgba(255,255,255,0.6)', marginBottom:12 }}>
          Chave Pix de <b style={{ color:'#fff' }}>{PARTY.parents}</b>
        </div>

        <div style={{ background:'rgba(255,255,255,0.06)', borderRadius:20,
          padding:12, border:'1px solid rgba(255,255,255,0.12)',
          display:'flex', gap:12, alignItems:'center', marginBottom:10 }}>
          <div style={{ width:72, height:72, borderRadius:10, background:'#fff',
            backgroundImage:'linear-gradient(45deg,#0F0F23 25%,transparent 25%),linear-gradient(-45deg,#0F0F23 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#0F0F23 75%),linear-gradient(-45deg,transparent 75%,#0F0F23 75%)',
            backgroundSize:'7px 7px', backgroundPosition:'0 0,0 3.5px,3.5px -3.5px,-3.5px 0px',
            position:'relative', flexShrink:0 }}>
            <div style={{ position:'absolute', inset:'35% 35%',
              background:'linear-gradient(135deg,#2563EB,#EC4899,#F97316)',
              borderRadius:6, boxShadow:'0 0 0 3px #fff' }} />
          </div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:10, color:'rgba(255,255,255,0.5)', marginBottom:2 }}>
              TEAM {team==='boy' ? 'BOY · 👦' : 'GIRL · 👧'} · {name.split(' ')[0].toUpperCase()}
            </div>
            <div style={{ fontSize:26, fontWeight:900, letterSpacing:-1, lineHeight:1,
              fontStyle:'italic' }}>{fmt(amount)}</div>
            <div style={{ fontSize:10, color:'#FCD34D', marginTop:4 }}>BabyBank</div>
          </div>
        </div>

        <div style={{ background:'linear-gradient(135deg,rgba(37,99,235,.2),rgba(236,72,153,.2),rgba(249,115,22,.2))',
          borderRadius:16, padding:2, marginBottom:10 }}>
          <div style={{ background:'#0F0F23', borderRadius:14, padding:'10px 12px',
            display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ flex:1, fontSize:10, color:'rgba(255,255,255,0.7)',
              fontFamily:'ui-monospace,monospace',
              whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
              {PARTY.pixCode}
            </div>
            <div onClick={onCopy} style={{
              height:30, padding:'0 12px', borderRadius:10,
              background: copied ? 'rgba(34,197,94,0.2)' : 'linear-gradient(90deg,#EC4899,#F97316)',
              color: copied ? '#86EFAC' : '#fff',
              fontSize:11, fontWeight:800,
              display:'flex', alignItems:'center', gap:5,
              border: copied ? '1px solid rgba(134,239,172,.35)' : 'none',
              cursor:'pointer', userSelect:'none', flexShrink:0,
            }}>{copied ? '✓ COPIADO' : 'COPIAR'}</div>
          </div>
        </div>

        <div style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 12px',
          borderRadius:12, background:'rgba(252,211,77,0.1)', border:'1px solid rgba(252,211,77,0.25)',
          marginBottom:'auto' }}>

// ─── SHARE: geração de imagem canvas ─────────────────────────────────────────
function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function generateShareCard(name, team) {
  const W = 1080, H = 1920;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const c = cv.getContext('2d');

  // fundo gradiente
  const g = c.createLinearGradient(0, 0, W, H);
  if (team === 'boy') {
    g.addColorStop(0, '#1e3a8a'); g.addColorStop(0.5, '#2563EB'); g.addColorStop(1, '#60A5FA');
  } else {
    g.addColorStop(0, '#831843'); g.addColorStop(0.5, '#EC4899'); g.addColorStop(1, '#F472B6');
  }
  c.fillStyle = g; c.fillRect(0, 0, W, H);

  // overlay escuro suave no topo e base
  const top = c.createLinearGradient(0,0,0,400);
  top.addColorStop(0,'rgba(0,0,0,0.45)'); top.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle = top; c.fillRect(0,0,W,400);
  const bot = c.createLinearGradient(0,H-500,0,H);
  bot.addColorStop(0,'rgba(0,0,0,0)'); bot.addColorStop(1,'rgba(0,0,0,0.5)');
  c.fillStyle = bot; c.fillRect(0,H-500,W,500);

  // pontos decorativos
  const dots = [{x:900,y:160,r:80},{x:120,y:H-200,r:60},{x:950,y:H-350,r:100},{x:200,y:600,r:40}];
  dots.forEach(d => {
    c.fillStyle = 'rgba(255,255,255,0.08)';
    c.beginPath(); c.arc(d.x,d.y,d.r,0,Math.PI*2); c.fill();
  });

  // tag topo
  c.fillStyle = 'rgba(255,255,255,0.18)';
  rrect(c, 80, 160, 360, 62, 31); c.fill();
  c.fillStyle = '#fff';
  c.font = `bold 28px -apple-system, Arial, sans-serif`;
  c.fillText(`● BETBABY · ${PARTY.date}`, 116, 202);

  // texto principal
  c.fillStyle = '#fff';
  c.font = `900 italic 200px -apple-system, Arial, sans-serif`;
  c.fillText('EU', 80, 580);
  c.font = `900 italic 150px -apple-system, Arial, sans-serif`;
  c.fillText('APOSTEI', 80, 760);

  // team
  const teamLabel = team === 'boy' ? 'MENINO!' : 'MENINA!';
  const teamEmoji = team === 'boy' ? '👦' : '👧';
  c.font = `900 italic 130px -apple-system, Arial, sans-serif`;
  c.fillStyle = 'rgba(255,255,255,0.92)';
  c.fillText(teamLabel, 80, 920);
  c.font = `110px -apple-system, Arial, sans-serif`;
  c.fillText(teamEmoji, 80, 1055);

  // subtítulo
  c.font = `48px -apple-system, Arial, sans-serif`;
  c.fillStyle = 'rgba(255,255,255,0.82)';
  c.fillText(`do ${PARTY.babyName}`, 80, 1130);

  // nome do apostador
  c.font = `bold 52px -apple-system, Arial, sans-serif`;
  c.fillStyle = 'rgba(255,255,255,0.6)';
  c.fillText(name, 80, 1200);

  // card inferior
  c.fillStyle = 'rgba(255,255,255,0.15)';
  rrect(c, 80, H-320, W-160, 200, 32); c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.25)';
  c.lineWidth = 2;
  rrect(c, 80, H-320, W-160, 200, 32); c.stroke();

  c.fillStyle = 'rgba(255,255,255,0.75)';
  c.font = `40px -apple-system, Arial, sans-serif`;
  c.fillText('E você, chuta o quê?', 120, H-255);
  c.fillStyle = '#fff';
  c.font = `bold 52px -apple-system, Arial, sans-serif`;
  c.fillText('betbaby.app/sorato  →', 120, H-185);

  return cv;
}

async function doShare(name, team) {
  const cv = generateShareCard(name, team);
  return new Promise((resolve) => {
    cv.toBlob(async (blob) => {
      const file = new File([blob], 'bet-revelacao.png', { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], title: 'BET Revelação',
            text: `Apostei no chá revelação do ${PARTY.babyName}!` });
        } catch(e) { if (e.name !== 'AbortError') downloadBlob(blob); }
      } else {
        downloadBlob(blob);
      }
      resolve();
    }, 'image/png');
  });
}

function downloadBlob(blob) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'bet-revelacao.png'; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

  const [team,   setTeam]     = React.useState('girl');
  const [amount, setAmount]   = React.useState(50);
  const [betId,  setBetId]    = React.useState(null);
  const [bets,   setBets]     = React.useState([]);
  const [appState, setAppState] = React.useState({ revealed: null, winners: null });
  const [loading, setLoading] = React.useState(false);
  const [showShare, setShowShare] = React.useState(false);

  // Socket.io para tempo real
  React.useEffect(() => {
    const socket = io(API, { transports: ['websocket', 'polling'] });

    socket.on('bet:new', ({ bet }) => {
      setBets(prev => {
        if (prev.find(b => b.id === bet.id)) return prev;
        return [...prev, bet];
      });
    });

    socket.on('bet:removed', ({ id }) => {
      setBets(prev => prev.filter(b => b.id !== id));
    });

    socket.on('state:update', (s) => {
      setAppState(s);
    });

    return () => socket.disconnect();
  }, []);

  // Carrega estado inicial
  React.useEffect(() => {
    fetch(`${API}/api/bets`)
      .then(r => r.json())
      .then(d => setBets(d.bets || []))
      .catch(() => {});

    fetch(`${API}/api/state`)
      .then(r => r.json())
      .then(d => setAppState(d))
      .catch(() => {});
  }, []);

  // Helper para navegar ao ranking pelo splash
  window._goRanking = () => setScreen('ranking');

  // Salva aposta e vai para sucesso
  const saveBet = async () => {
    setLoading(true);
    try {
      const res = await fetch(`${API}/api/bets`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name.trim(), team, amount }),
      });
      const data = await res.json();
      if (data.bet) {
        setBetId(data.bet.id);
        setScreen('success');
      } else {
        alert('Erro ao salvar aposta. Tente novamente.');
      }
    } catch(e) {
      alert('Erro de conexão. Verifique sua internet.');
    } finally {
      setLoading(false);
    }
  };

  const goToPixScreen = () => {
    // Salva o bet ao chegar na tela de Pix
    if (!betId) {
      setLoading(true);
      fetch(`${API}/api/bets`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name.trim(), team, amount }),
      })
        .then(r => r.json())
        .then(data => {
          if (data.bet) setBetId(data.bet.id);
        })
        .catch(() => {})
        .finally(() => { setLoading(false); });
    }
    setScreen('pix');
  };

  const screens = {
    splash:  <SplashScreen bets={bets} onStart={() => setScreen('name')} />,
    name:    <NameScreen name={name} setName={setName}
               onNext={() => setScreen('gender')} onBack={() => setScreen('splash')} />,
    gender:  <GenderScreen team={team} setTeam={setTeam}
               onNext={() => setScreen('amount')} onBack={() => setScreen('name')} />,
    amount:  <AmountScreen amount={amount} setAmount={setAmount}
               onNext={goToPixScreen} onBack={() => setScreen('gender')} />,
    pix:     <PixScreen name={name} team={team} amount={amount} betId={betId}
               loading={loading} onConfirm={() => setScreen('success')}
               onBack={() => setScreen('amount')} />,
    success: <SuccessScreen name={name} team={team} amount={amount}
               onRanking={() => setScreen('ranking')} />,
    ranking: <RankingScreen bets={bets} myBetId={betId} appState={appState}
               name={name} team={team}
               onShare={() => setShowShare(true)}
               onBack={() => setScreen(betId ? 'success' : 'splash')} />,
  };

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', background:'#0a0a1a' }}>
      <div style={{ width:'100%', maxWidth:430, height:'100%',
        maxHeight:920, position:'relative', overflow:'hidden',
        background:'#0F0F23' }}>
        {screens[screen]}
        {showShare && (
          <ShareModal name={name} team={team} onClose={() => setShowShare(false)} />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
